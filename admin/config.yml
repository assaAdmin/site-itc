backend:
  name: git-gateway
  branch: main

media_folder: "assets/gallery"
public_folder: "/assets/gallery"

publish_mode: simple

locale: "fr"

collections:
  - name: "gallery"
    label: "Galerie (photos & vidéos)"
    file: "data/gallery.json"
    identifier_field: title
    fields:
      - label: "Éléments de la galerie"
        name: "items"
        widget: "list"
        summary: "{{title}} — {{type}}"
        fields:
          - label: "Titre"
            name: "title"
            widget: "string"
          - label: "Type"
            name: "type"
            widget: "select"
            options:
              - { label: "Photo", value: "image" }
              - { label: "Vidéo (lien YouTube / Facebook)", value: "video" }
            default: "image"
          - label: "Photo (si type = Photo)"
            name: "file"
            widget: "image"
            required: false
            hint: "Téléversez la photo ici. Laissez vide si vous ajoutez une vidéo."
          - label: "Lien de la vidéo (si type = Vidéo)"
            name: "video_url"
            widget: "string"
            required: false
            hint: "Collez le lien YouTube ou Facebook de la vidéo. Laissez vide si vous ajoutez une photo."
          - label: "Description"
            name: "description"
            widget: "text"
            required: false
          - label: "Date"
            name: "date"
            widget: "datetime"
            format: "YYYY-MM-DD"
            default: ""
